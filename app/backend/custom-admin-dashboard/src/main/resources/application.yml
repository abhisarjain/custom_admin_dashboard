server:
  port: 8080

spring:
  application:
    name: custom-admin-dashboard

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/admin_platform_db
    username: admin_user
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    user:
      password: disabled

jasypt:
  encryptor:
    password: your-secret-encryption-key

jwt:
  secret: your-super-secret-jwt-key-which-is-long-enough-for-hs256-algorithm
  expiration: 86400000
logging:
  level:
    com.customadmindashboard: DEBUG